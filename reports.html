<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .under-development {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            color: #4a5568;
        }

        .dev-container {
            max-width: 400px;
            padding: 2rem;
        }

        .dev-icon {
            font-size: 4rem;
            color: #3b82f6;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        .under-development h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #1a202c;
        }

        .under-development p {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }


        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-boxes-stacked"></i> 
                <span>Title</span>
            </div>

            <nav>
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-line icon"></i> 
                    <span>Dashboard</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fa-solid fa-boxes-packing icon"></i> 
                    <span>Inventory</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fa-solid fa-cart-shopping icon"></i> 
                    <span>Orders</span>
                </a>
                <a href="reports.html" class="nav-item active">
                    <i class="fa-solid fa-file-invoice-dollar icon"></i> 
                    <span>Reports</span>
                </a>
                <a href="supplies.html" class="nav-item">
                    <i class="fa-solid fa-truck-ramp-box icon"></i> 
                    <span>Supplies</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fa-solid fa-gears icon"></i> 
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="login.html" class="nav-item">
                    <i class="fa-solid fa-right-from-bracket icon"></i> 
                    <span>Logout</span>
                </a>
            </div>


        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="sidebarToggle" class="hamburger-btn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1>Dashboard</h1>
                </div>
                <div class="user-profile">
                    <i class="fa-solid fa-circle-user"></i>
                </div>
            </header>

           
            <section class="under-development">
                <div class="dev-container">
                    <i class="fa-solid fa-code-compare dev-icon"></i>
                    <h2>Section Under Development</h2>
                    <p>We're currently building something awesome here. Check back soon!</p>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </section>


        </main>
    </div>

    <script>
    const sidebar = document.querySelector('.sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
    });
</script>
</body>
</html>
