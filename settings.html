<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
<style>
    .main-content {
        background-color: #fdfbf4;
        height: 100vh;          
        overflow-y: auto;       
        display: flex;
        flex-direction: column;
    }

    .header {
        position: sticky;
        top: 0;
        z-index: 1000;           
        flex-shrink: 0;          
        border-bottom: 1px solid #e8e4d8; 
    }

    .settings-container {
        max-width: 900px;        
        margin: 0 auto;          
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 20px;
        padding-bottom: 50px;   
    }

    .settings-card {
        background: white;
        border: 1px solid #e8e4d8;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
    }

    .profile-header {
        display: flex;
        align-items: flex-start;
        gap: 15px;
    }

    .profile-pic-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .profile-pic {
        font-size: 60px;
        color: #7ba6c9;
    }

    .change-photo-btn {
        background: #f28c28;
        color: white;
        border: none;
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 0.7rem;
        cursor: pointer;
        white-space: nowrap;
    }

    .input-group {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
        font-size: 0.85rem;
    }

    .settings-input {
        width: 100%;
        padding: 8px 10px 8px 32px;
        border: 1px solid #e0ddd0;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 0.85rem;
        background: #fff;
    }

    .card-title {
        font-size: 0.9rem;
        font-weight: bold;
        color: #444;
        margin-bottom: 10px;
        display: block;
    }

    .notification-sub {
        font-size: 0.8rem;
        font-weight: bold;
        color: #333;
        margin: 10px 0 5px 0;
    }

    .toggle-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .toggle-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: #555;
    }

    .switch {
        position: relative;
        display: inline-block;
        width: 34px;
        height: 18px;
    }

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #f28c28;
        transition: .4s;
        border-radius: 20px;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 12px;
        width: 12px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }

    input:checked+.slider:before {
        transform: translateX(16px);
    }

    .permissions-area {
        height: 120px;
        border: 1px solid #e0ddd0;
        border-radius: 8px;
        margin-top: 5px;
    }

    .btn-row {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
    }

    .apply-btn {
        background: #f28c28;
        color: white;
        border: none;
        padding: 8px 25px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.85rem;
    }
</style>
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-boxes-stacked"></i>
                <span>Title</span>
            </div>

            <nav>
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-line icon"></i>
                    <span>Dashboard</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fa-solid fa-boxes-packing icon"></i>
                    <span>Inventory</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fa-solid fa-cart-shopping icon"></i>
                    <span>Orders</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fa-solid fa-file-invoice-dollar icon"></i>
                    <span>Reports</span>
                </a>
                <a href="supplies.html" class="nav-item">
                    <i class="fa-solid fa-truck-ramp-box icon"></i>
                    <span>Supplies</span>
                </a>
                <a href="settings.html" class="nav-item active">
                    <i class="fa-solid fa-gears icon"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="login.html" class="nav-item">
                    <i class="fa-solid fa-right-from-bracket icon"></i>
                    <span>Logout</span>
                </a>
            </div>


        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="sidebarToggle" class="hamburger-btn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1>Settings</h1>
                </div>
                <div class="user-profile">
                    <i class="fa-solid fa-circle-user"></i>
                </div>
            </header>

            <section class="settings-container" style="max-width: 900px; padding: 20px;">






                <div style="display: flex; flex-direction: column; gap: 15px;">

                    <div class="settings-card">
                        <div class="profile-header">
                            <div class="profile-pic-container">
                                <i class="fa-solid fa-circle-user profile-pic"></i>
                                <button class="change-photo-btn">Change photo</button>
                            </div>
                            <div class="input-group">
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-user"></i>
                                    <input type="text" class="settings-input" value="Aliza Mae Consabo">
                                </div>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-envelope"></i>
                                    <input type="email" class="settings-input" value="Email Address">
                                </div>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-phone"></i>
                                    <input type="text" class="settings-input" value="Phone">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <span class="card-title">Change Password</span>
                        <div class="input-wrapper" style="margin-bottom: 8px;">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="settings-input" placeholder="Current Password">
                        </div>
                        <div class="input-wrapper" style="margin-bottom: 8px;">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="settings-input" placeholder="New Password">
                        </div>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="settings-input" placeholder="Confirm New Password">
                        </div>
                    </div>

                    <div class="settings-card">
                        <span class="card-title">Notifications Preferences</span>
                        
                        <div class="notification-sub">Email notifications</div>
                        <div class="toggle-grid">
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>New Order</span>
                            </div>
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>New Order</span>
                            </div>
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>Stock Level Alert</span>
                            </div>
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>Stock Level Alert</span>
                            </div>
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>Inventory updates</span>
                            </div>
                        </div>

                        <div class="notification-sub" style="margin-top: 15px;">App Notifications</div>
                        <div class="toggle-grid">
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>New Order</span>
                            </div>
                            <div class="toggle-item">
                                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                                <span>Stock Level Alert</span>
                            </div>
                        </div>
                    </div>

                    <div class="settings-card">
                        <span class="card-title">Permissions</span>
                        <div class="permissions-area"></div>
                    </div>

                    <div class="btn-row">
                        <button class="apply-btn">Apply Changes</button>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
    </script>
</body>

</html>
