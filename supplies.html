<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplies - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-section {
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-header-bar {
            background-color: #f28c28;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 20px;
            border-radius: 10px;
        }

        .form-body {
            padding: 20px 40px 40px 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .full-width { grid-column: span 2; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .input-group input, .input-group select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            font-family: inherit;
        }

        /* Quantity controls */
        .qty-input {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: fit-content;
        }
        .qty-input button {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
        }
        .qty-input input {
            border: none;
            width: 60px;
            text-align: center;
            padding: 5px;
        }

        /* Status Radio simulation */
        .status-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-option {
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.85rem;
            width: 120px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }
        .status-option.selected {
            border-color: #333;
            color: #000;
        }
        .dot { height: 8px; width: 8px; background: #bbb; border-radius: 50%; }
        .selected .dot { background: #000; }

        .form-footer {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-save {
            background-color: #f28c28;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-cancel {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-boxes-stacked"></i> 
                <span>Title</span>
            </div>

            <nav>
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-line icon"></i> 
                    <span>Dashboard</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fa-solid fa-boxes-packing icon"></i> 
                    <span>Inventory</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fa-solid fa-cart-shopping icon"></i> 
                    <span>Orders</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fa-solid fa-file-invoice-dollar icon"></i> 
                    <span>Reports</span>
                </a>
                <a href="supplies.html" class="nav-item active">
                    <i class="fa-solid fa-truck-ramp-box icon"></i> 
                    <span>Supplies</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fa-solid fa-gears icon"></i> 
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="login.html" class="nav-item">
                    <i class="fa-solid fa-right-from-bracket icon"></i> 
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button id="sidebarToggle" class="hamburger-btn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1>Supplies Management</h1>
                </div>
                <div class="user-profile">
                    <i class="fa-solid fa-circle-user"></i>
                </div>
            </header>

            <section class="form-section">
                <div class="form-container">
                    <div class="form-header-bar">Add / Update Stock Items</div>
                    
                    <form class="form-body">
                        <div class="input-group full-width">
                            <label>Product Name</label>
                            <input type="text" placeholder="Heavy Duty Broom">
                        </div>

                        <div class="input-group">
                            <label>Quantity</label>
                            <div class="qty-input">
                                <button type="button">-</button>
                                <input type="number" value="200">
                                <button type="button">+</button>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Category</label>
                            <select>
                                <option>Brooms</option>
                                <option>Brushes</option>
                                <option>Doormat & Mats</option>
                                <option>Bucket & Pads</option>
                                <option>Mops</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Stock Status</label>
                            <div class="status-group">
                                <div class="status-option selected"><div class="dot"></div> In Stock</div>
                                <div class="status-option"><div class="dot"></div> Out of Stock</div>
                                <div class="status-option"><div class="dot"></div> On Order</div>
                            </div>
                        </div>

                        <div class="form-footer">
                            <button type="submit" class="btn-save">Save Change</button>
                            <button type="button" class="btn-cancel">Cancel</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
    </script>
</body>
</html>
